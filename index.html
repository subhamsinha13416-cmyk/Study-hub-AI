<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Have AI - By Subham Sinha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .result-box { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <header class="bg-indigo-600 p-6 text-center">
            <h1 class="text-3xl font-bold text-white">Study Have AI</h1>
            <p class="text-indigo-100 mt-2">Enter text or upload a file for smart study assistance.</p>
        </header>

        <main class="p-6 space-y-6">
            <div>
                <label for="topicInput" class="block text-sm font-semibold text-gray-700 mb-2">Topic or Notes Description:</label>
                <textarea id="topicInput" rows="5" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="e.g., Explain Newton's Second Law of Motion..."></textarea>
            </div>

            <div class="bg-indigo-50 p-4 rounded-xl border-2 border-dashed border-indigo-200">
                <label class="block text-sm font-semibold text-indigo-700 mb-2">Upload a File (Image or PDF):</label>
                <input type="file" id="fileInput" accept="image/*,application/pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="handleAction('plan')" class="py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition">Generate Plan</button>
                <button onclick="handleAction('summary')" class="py-3 px-6 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition">Generate Summary</button>
                <button onclick="handleAction('mistakes')" class="py-3 px-6 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-xl transition">Common Mistakes</button>
            </div>

            <div id="resultArea" class="hidden">
                <h2 id="resultTitle" class="text-xl font-bold text-indigo-900 mb-4 border-b pb-2">Result</h2>
                <div id="loadingIndicator" class="hidden text-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
                    <p class="mt-4 text-gray-600">Thinking hard... generating help...</p>
                </div>
                <div id="resultOutput" class="result-box bg-gray-50 p-6 rounded-xl border border-gray-200 text-gray-800 leading-relaxed"></div>
            </div>
        </main>

        <footer class="bg-gray-100 p-4 text-center text-sm text-gray-500">
            Created by Subham Sinha &copy; 2026
        </footer>
    </div>

    <script>
        // Obfuscated Key Architecture
    const keyPart1 = "AIzaSyA66mbZMrDTQS";
    const keyPart2 = "abkW1JfgXyy6a275dg5vE";
    const apiKey = keyPart1 + keyPart2;
    const apiUrlBase = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
        
        
        //

        // Helper: Convert file to Base64 for Gemini
        async function fileToGenerativePart(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve({
                    inlineData: { data: reader.result.split(',')[1], mimeType: file.type },
                });
                reader.readAsDataURL(file);
            });
        }

        async function handleAction(type) {
            const topic = document.getElementById('topicInput').value;
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const outputArea = document.getElementById('resultArea');
            const outputText = document.getElementById('resultOutput');
            const loading = document.getElementById('loadingIndicator');

            if (!topic && !file) {
                alert("Please enter a topic or upload a file.");
                return;
            }

            // Show loading and reset output
            outputArea.classList.remove('hidden');
            loading.classList.remove('hidden');
            outputText.textContent = "";

            let prompt = "";
            if (type === 'plan') prompt = `Create a detailed study plan for: ${topic}`;
            if (type === 'summary') prompt = `Provide a clear summary of this: ${topic}`;
            if (type === 'mistakes') prompt = `Identify common mistakes students make with: ${topic}`;

            let parts = [{ text: prompt }];
            if (file) {
                const filePart = await fileToGenerativePart(file);
                parts.push(filePart);
            }

                        try {
                const response = await fetch(apiUrlBase, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });

                if (!response.ok) {
                    // NEW: This fetches the specific reason from Google (e.g. "API key disabled")
                    const errorData = await response.json();
                    throw new Error(errorData.error.message || `Status: ${response.status}`);
                }
                
                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                outputText.textContent = result;
            } catch (error) {
                // This will now show the REAL reason for the error
                outputText.textContent = `Error: ${error.message}`;
            } finally {
                loading.classList.add('hidden');
                        }
            
        }
    </script>
</body>
</html>
